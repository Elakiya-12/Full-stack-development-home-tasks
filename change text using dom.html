
<!DOCTYPE html>
<html>
<head>
    <title>Change Text Using DOM</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f4;
        }

        h2{
            color: #333;
        }

        button{
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h2 id="text">Hello World!</h2>

    <button onclick="changeText()">Change Text</button>

    <script>
        function changeText()
        {
            document.getElementById("text").textContent = "Welcome to JavaScript DOM!";
        }
    </script>

</body>
</html>
